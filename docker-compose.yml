services:
  db:
    image: mysql:8.0.36
    container_name: ev-log-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-diandong5k56la1f}
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
    ports:
      - "${DB_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/diandong5k56la1f.sql:/docker-entrypoint-initdb.d/001_base.sql:ro
      - ./db/init/002_feature_patch.sql:/docker-entrypoint-initdb.d/002_feature_patch.sql:ro
      - ./db/init/003_demo_data_cleanup.sql:/docker-entrypoint-initdb.d/003_demo_data_cleanup.sql:ro

volumes:
  mysql_data:
