services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BASE_IMAGE: ${BACKEND_BASE_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${BACKEND_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: ev-log-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-diandong5k56la1f}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      REDIS_DB: ${REDIS_DB:-1}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-true}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.qq.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      CONTAINER_TZ: ${CONTAINER_TZ:-Asia/Shanghai}
      OPEN_ADMIN_ON_RUNSERVER: ${OPEN_ADMIN_ON_RUNSERVER:-0}
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    command: python manage.py runserver --insecure 0.0.0.0:8080 --noreload

  db:
    image: mysql:8.0.36
    container_name: ev-log-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-diandong5k56la1f}
      TZ: ${CONTAINER_TZ:-Asia/Shanghai}
    ports:
      - "${DB_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/diandong5k56la1f.sql:/docker-entrypoint-initdb.d/001_base.sql:ro
      - ./db/init/002_feature_patch.sql:/docker-entrypoint-initdb.d/002_feature_patch.sql:ro
      - ./db/init/003_demo_data_cleanup.sql:/docker-entrypoint-initdb.d/003_demo_data_cleanup.sql:ro
      - ./db/init/004_prediction_upgrade.sql:/docker-entrypoint-initdb.d/004_prediction_upgrade.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    container_name: ev-log-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-123456}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
